name: Social Calendar Publisher

# Ref: AC-OQ1 (10-min cron), AC5 (scheduling gate), AC6 (commit status back),
#      AC12 (main branch check), Daedalus design (concurrency, push trigger)

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes
  push:
    branches: [main]
    paths:
      - 'brands/**/calendar/**/*.md'  # Immediate trigger on content merge
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand slug (or "all" for all brands)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (no API calls)'
        type: boolean
        required: false
        default: false

# Serialize runs — no overlapping publishes (Daedalus: rate limit file integrity)
concurrency:
  group: publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production  # Requires environment protection rules for prod credentials

    permissions:
      contents: write   # Commit status back to repo (AC6)
      issues: write     # Create failure issues (AC7)
      id-token: write   # OIDC for Azure Key Vault

    # Skip if this is a publisher status commit (prevents publish -> commit -> publish loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout (full history for AC12 git log main check)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup xurl auth (AC15)
        if: env.XURL_CONFIG_JSON != ''
        run: |
          mkdir -p ~/.config/xurl
          echo '${{ secrets.XURL_CONFIG_JSON }}' > ~/.config/xurl/config.json
          chmod 600 ~/.config/xurl/config.json
        env:
          XURL_CONFIG_JSON: ${{ secrets.XURL_CONFIG_JSON }}

      - name: Install xurl
        run: |
          if ! command -v xurl &> /dev/null; then
            echo "xurl not found, installing..."
            pip install xurl 2>/dev/null || echo "xurl install skipped (not available as pip package)"
          fi

      - name: Azure Login (OIDC for Key Vault)
        if: vars.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r publisher/requirements.txt

      - name: Run Publisher (GHL Social Planner)
        run: |
          python scripts/publish_posts.py \
            --brand brands/secondring/brand.yaml \
            --all \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          ASSETS_BASE_URL: ${{ vars.ASSETS_BASE_URL }}

      - name: Commit status updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brands/
          if ! git diff --staged --quiet; then
            git commit -m "chore: record publish status [skip ci]"
            git push
          else
            echo "No status changes to commit."
          fi
