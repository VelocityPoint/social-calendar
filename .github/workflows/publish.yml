name: Publish to GHL Social Planner

# Ref: Vulcan design spec (issue #2), AC7 (GHL adapter integration),
#      AC6 (commit status back), AC8 (brand config / account resolution)
#
# Trigger: push to main when calendar post files change (merge event).
# NOT cron-triggered: GHL handles native scheduling via scheduledAt timestamp.
# Publisher pushes posts to GHL on merge; GHL fires them at the right time.

on:
  push:
    branches: [main]
    paths:
      - "brands/**/calendar/**/*.md"
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand slug (or "all" for all brands)'
        required: false
        default: "all"
      dry_run:
        description: "Dry run (no API calls)"
        type: boolean
        required: false
        default: false
      files:
        description: "Specific files to process (newline-separated, optional)"
        required: false
        default: ""

# Serialize runs — no overlapping publishes (file integrity + rate limit safety)
concurrency:
  group: ghl-publisher
  cancel-in-progress: false

permissions:
  contents: write  # Commit status updates back to repo (AC6)
  issues: write    # Create failure issues (AC7)

jobs:
  publish:
    runs-on: ubuntu-latest

    # Skip if this is a publisher status commit (prevents publish → commit → publish loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout (full history for git diff HEAD~1 HEAD)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r publisher/requirements.txt

      - name: Configure git for status commit-back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Identify changed post files (push trigger)
        id: changed
        if: github.event_name == 'push'
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- "brands/**/calendar/**/*.md" || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Identified changed files:"
          echo "$FILES"

      - name: Publish ready posts to GHL (push trigger)
        if: github.event_name == 'push'
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          ASSETS_BASE_URL: ${{ vars.ASSETS_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
        run: |
          python -m publisher.publisher \
            --mode ghl \
            --brand all \
            --files "${{ steps.changed.outputs.files }}"

      - name: Publish ready posts to GHL (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          ASSETS_BASE_URL: ${{ vars.ASSETS_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi
          FILES_ARG=""
          if [ -n "${{ inputs.files }}" ]; then
            FILES_ARG="--files \"${{ inputs.files }}\""
          fi
          python -m publisher.publisher \
            --mode ghl \
            --brand "${{ inputs.brand }}" \
            $EXTRA_ARGS \
            $FILES_ARG

      - name: Commit status updates
        run: |
          git add brands/
          if ! git diff --staged --quiet; then
            git commit -m "chore: record GHL publish status [skip ci]"
            git push
          else
            echo "No status changes to commit."
          fi
