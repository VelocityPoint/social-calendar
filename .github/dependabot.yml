# Auto-generated by scripts/setup-dependabot.sh — see dave/setup-dependabot PRs.
#
# Pre-revenue posture: patch+minor bumps grouped weekly per ecosystem,
# auto-mergeable on green CI. Major-version bumps land as separate PRs so
# breaking changes (e.g. xunit 2->3, AppInsights 2->3) get deliberate review.

version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions-patch-and-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      pip-patch-and-minor:
        update-types: ["patch", "minor"]
    # Major-version bumps land as separate PRs so breaking changes get review.
    # (Default behavior — no `ignore` clause needed.)
